{% extends "base.html" %}
{% block title %}{{ action }} Departamento{% endblock %}

{% block content %}

<div class="page-header">
  <div class="page-header-row">
    <div>
      <h1>{{ action }}<br>Departamento</h1>
      <p>Nodo :Department</p>
    </div>
    <a href="{{ url_for('departments.index') }}" class="btn btn-outline" style="border-color:rgba(59,26,14,0.25);color:var(--muted);">Cancelar</a>
  </div>
</div>

<div class="card-dark">
  <div class="card-dark-title">Datos del Departamento</div>
  <form method="POST">
    <div class="form-grid">

      <div class="form-group">
        <label for="deptno">Numero de Departamento</label>
        <input type="number" id="deptno" name="deptno"
               value="{{ dept.deptno if dept else '' }}"
               placeholder="Ej. 50"
               {{ 'readonly' if dept else '' }} required />
        {% if dept %}<p class="hint">No puede modificarse.</p>{% endif %}
      </div>

      <div class="form-group">
        <label for="dname">Nombre</label>
        <input type="text" id="dname" name="dname"
               value="{{ dept.dname if dept else '' }}"
               placeholder="Ej. ACCOUNTING" required />
      </div>

      <div class="form-group full">
        <label for="loc">Ubicacion</label>
        <input type="text" id="loc" name="loc"
               value="{{ dept.loc if dept else '' }}"
               placeholder="Ej. NEW YORK" required />
      </div>

    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-black">{{ action }}</button>
      <a href="{{ url_for('departments.index') }}" class="btn btn-outline" style="border-color:rgba(255,255,255,0.20);color:rgba(255,255,255,0.55);">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}
