{% extends "base.html" %}
{% block title %}{{ action }} Empleado{% endblock %}

{% block content %}

<div class="page-header">
  <div class="page-header-row">
    <div>
      <h1>{{ action }}<br>Empleado</h1>
      <p>Nodo :Employee</p>
    </div>
    <a href="{{ url_for('employees') }}" class="btn btn-outline" style="border-color:rgba(59,26,14,0.25);color:var(--muted);">Cancelar</a>
  </div>
</div>

<div class="card-dark">
  <div class="card-dark-title">Datos del Empleado</div>
  <form method="POST">
    <div class="form-grid">

      <div class="form-group">
        <label for="empno">Numero de Empleado</label>
        <input type="number" id="empno" name="empno"
               value="{{ emp.empno if emp else '' }}"
               placeholder="Ej. 7999"
               {{ 'readonly' if emp else '' }} required />
        {% if emp %}<p class="hint">No puede modificarse.</p>{% endif %}
      </div>

      <div class="form-group">
        <label for="ename">Nombre</label>
        <input type="text" id="ename" name="ename"
               value="{{ emp.ename if emp else '' }}"
               placeholder="Ej. SMITH" required />
      </div>

      <div class="form-group">
        <label for="job">Puesto</label>
        <input type="text" id="job" name="job"
               value="{{ emp.job if emp else '' }}"
               placeholder="Ej. CLERK" required />
      </div>

      <div class="form-group">
        <label for="mgr">No. Jefe (opcional)</label>
        <input type="number" id="mgr" name="mgr"
               value="{{ emp.mgr if emp and emp.mgr else '' }}"
               placeholder="Dejar vacio si no aplica" />
      </div>

      <div class="form-group">
        <label for="hiredate">Fecha de Alta</label>
        <input type="date" id="hiredate" name="hiredate"
               value="{{ emp.hiredate if emp else '' }}" required />
      </div>

      <div class="form-group">
        <label for="sal">Salario</label>
        <input type="number" id="sal" name="sal" step="0.01"
               value="{{ emp.sal if emp else '' }}"
               placeholder="Ej. 2000.00" required />
      </div>

      <div class="form-group">
        <label for="comm">Comision (opcional)</label>
        <input type="number" id="comm" name="comm" step="0.01"
               value="{{ emp.comm if emp and emp.comm is not none else '' }}"
               placeholder="Dejar vacio si no aplica" />
      </div>

      <div class="form-group">
        <label for="deptno">Departamento</label>
        <select id="deptno" name="deptno" required>
          <option value="">Seleccionar...</option>
          {% for d in depts %}
          <option value="{{ d.deptno }}"
            {{ 'selected' if emp and emp.deptno == d.deptno }}>
            {{ d.deptno }} — {{ d.dname }}
          </option>
          {% endfor %}
        </select>
      </div>

    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-black">{{ action }}</button>
      <a href="{{ url_for('employees') }}" class="btn btn-outline" style="border-color:rgba(255,255,255,0.20);color:rgba(255,255,255,0.55);">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}
