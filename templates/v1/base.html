<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SCOTT DB{% endblock %} — Neo4j CRUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ─────────────────────────────────────── */
    :root {
      --bg:        #f5f0e8;
      --surface:   #ede6d6;
      --border:    #d4c9b0;
      --accent:    #c8a84b;
      --accent-dk: #a8893a;
      --brown:     #5c4033;
      --text:      #2e2318;
      --muted:     #8a7560;
      --danger:    #b04030;
      --radius:    6px;
      --shadow:    0 2px 8px rgba(92,64,51,0.10);
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Sidebar ───────────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--brown);
      color: #e8dcc8;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .sidebar-logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }
    .sidebar-logo span {
      font-size: 0.72rem;
      color: rgba(232,220,200,0.55);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .nav { padding: 20px 0; flex: 1; }
    .nav-section {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(232,220,200,0.40);
      padding: 16px 24px 6px;
    }
    .nav a {
      display: block;
      padding: 9px 24px;
      color: rgba(232,220,200,0.80);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 400;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .nav a:hover,
    .nav a.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(200,168,75,0.08);
    }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.72rem;
      color: rgba(232,220,200,0.30);
    }

    /* ── Main content ──────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--brown);
    }
    .topbar-sub {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .content { padding: 36px; flex: 1; }

    /* ── Cards ─────────────────────────────────────────── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--brown);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Stat grid (index) ─────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      box-shadow: var(--shadow);
    }
    .stat-card .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      color: var(--accent-dk);
      line-height: 1;
    }
    .stat-card .stat-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.10em;
      margin-top: 6px;
    }
    .stat-card .stat-bar {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin-top: 14px;
      opacity: 0.5;
    }

    /* ── Table ─────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    thead tr {
      border-bottom: 2px solid var(--border);
    }
    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--muted);
      font-weight: 500;
    }
    tbody tr {
      border-bottom: 1px solid var(--surface);
      transition: background 0.12s;
    }
    tbody tr:hover { background: var(--surface); }
    tbody td { padding: 11px 14px; color: var(--text); }

    /* ── Badges ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
    }
    .badge-dept  { background: #e8dcc8; color: var(--brown); }
    .badge-emp   { background: #fdf3d0; color: var(--accent-dk); }
    .badge-job   { background: #ede6d6; color: var(--muted); }

    /* ── Buttons ───────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 8px 18px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-dk); }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--brown);
    }
    .btn-secondary:hover { background: var(--surface); }
    .btn-danger {
      background: transparent;
      border: 1px solid #e0c0bc;
      color: var(--danger);
      font-size: 0.78rem;
      padding: 5px 12px;
    }
    .btn-danger:hover { background: #fdf0ee; }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; }

    .actions { display: flex; gap: 8px; align-items: center; }
    .page-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .page-actions h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--brown);
    }

    /* ── Forms ─────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 24px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      font-weight: 500;
    }
    input, select {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      transition: border 0.15s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      background: #fff;
    }
    .form-actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }
    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Flash / alert ─────────────────────────────────── */
    .alert {
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      margin-bottom: 20px;
    }
    .alert-info { background: #fdf3d0; border: 1px solid #e8d490; color: var(--accent-dk); }

    /* ── Empty state ───────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>SCOTT DB</h1>
      <span>Neo4j Graph CRUD</span>
    </div>
    <nav class="nav">
      <div class="nav-section">Navegacion</div>
      <a href="{{ url_for('index') }}"       class="{{ 'active' if request.endpoint == 'index' }}">Inicio</a>
      <a href="{{ url_for('graph') }}"        class="{{ 'active' if request.endpoint == 'graph' }}">Grafo Visual</a>
      <div class="nav-section">Entidades</div>
      <a href="{{ url_for('departments') }}"  class="{{ 'active' if 'department' in request.endpoint }}">Departamentos</a>
      <a href="{{ url_for('employees') }}"    class="{{ 'active' if 'employee'   in request.endpoint }}">Empleados</a>
    </nav>
    <div class="sidebar-footer">Base de Datos Avanzadas</div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">{% block topbar_title %}{% endblock %}</div>
        <div class="topbar-sub">{% block topbar_sub %}{% endblock %}</div>
      </div>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>

</div>
</body>
</html>
