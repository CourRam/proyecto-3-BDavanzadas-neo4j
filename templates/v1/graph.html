{% extends "base.html" %}

{% block title %}Grafo Visual{% endblock %}
{% block topbar_title %}Visualizacion del Grafo{% endblock %}
{% block topbar_sub %}Nodos y relaciones en Neo4j{% endblock %}

{% block content %}

<div class="card" style="padding:0; overflow:hidden;">
  <div id="graph-container" style="width:100%; height:560px; background:#fdf8f0; position:relative;">
    <div id="legend" style="position:absolute;top:16px;left:16px;font-size:0.75rem;color:var(--muted);line-height:2;">
      <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#c8a84b;margin-right:6px;vertical-align:middle;"></span>Department
      <br>
      <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#5c4033;margin-right:6px;vertical-align:middle;"></span>Employee
    </div>
    <svg id="graph-svg" width="100%" height="100%"></svg>
  </div>
</div>

<div class="card" id="node-detail" style="display:none;">
  <div class="card-title">Detalle del nodo</div>
  <pre id="node-props" style="font-size:0.82rem;color:var(--muted);line-height:1.7;white-space:pre-wrap;"></pre>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
(async () => {
  const data = await fetch("/api/graph-data").then(r => r.json());

  const W = document.getElementById("graph-svg").clientWidth || 900;
  const H = 560;

  const svg = d3.select("#graph-svg");
  const g   = svg.append("g");

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.3, 3]).on("zoom", e => g.attr("transform", e.transform)));

  // Defs: arrowhead
  svg.append("defs").append("marker")
    .attr("id", "arrow")
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 22).attr("refY", 0)
    .attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", "#c8a84b");

  // Build id maps
  const nodeById = new Map(data.nodes.map(n => [n.id, n]));

  const simulation = d3.forceSimulation(data.nodes)
    .force("link",   d3.forceLink(data.links).id(d => d.id).distance(110))
    .force("charge", d3.forceManyBody().strength(-320))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("collision", d3.forceCollide(28));

  // Links
  const link = g.append("g").selectAll("line")
    .data(data.links).join("line")
    .attr("stroke", "#d4c9b0")
    .attr("stroke-width", 1.5)
    .attr("marker-end", "url(#arrow)");

  // Link labels
  const linkLabel = g.append("g").selectAll("text")
    .data(data.links).join("text")
    .attr("font-size", "9px")
    .attr("fill", "#a8893a")
    .attr("text-anchor", "middle")
    .text(d => d.type);

  // Nodes
  const node = g.append("g").selectAll("circle")
    .data(data.nodes).join("circle")
    .attr("r", d => d.label === "Department" ? 22 : 16)
    .attr("fill", d => d.label === "Department" ? "#c8a84b" : "#5c4033")
    .attr("stroke", "#fff")
    .attr("stroke-width", 2)
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end",   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on("click", (e, d) => {
      document.getElementById("node-detail").style.display = "block";
      document.getElementById("node-props").textContent =
        JSON.stringify(d.props, null, 2);
    });

  // Node labels
  const label = g.append("g").selectAll("text")
    .data(data.nodes).join("text")
    .attr("font-size", "10px")
    .attr("fill", "#2e2318")
    .attr("text-anchor", "middle")
    .attr("dy", "0.35em")
    .text(d => d.name)
    .style("pointer-events", "none");

  simulation.on("tick", () => {
    link
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    linkLabel
      .attr("x", d => (d.source.x + d.target.x) / 2)
      .attr("y", d => (d.source.y + d.target.y) / 2);
    node .attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x",  d => d.x).attr("y",  d => d.y + 30);
  });
})();
</script>

{% endblock %}
