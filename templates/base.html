<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SCOTT DB{% endblock %} — Neo4j CRUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ─────────────────────────────────────── */
    :root {
      --cream:     #e8e4dc;
      --brown-dk:  #3b1a0e;
      --brown-md:  #5c2d1e;
      --brown-card:#4a1a10;
      --gold:      #d4940a;
      --gold-lt:   #f0b429;
      --black:     #111111;
      --white:     #ffffff;
      --text:      #3b1a0e;
      --muted:     #7a5c4a;
      --radius-pill: 40px;
      --radius-card: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }

    /* ── NAVBAR ────────────────────────────────────────── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      height: 72px;
      background: var(--cream);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(59,26,14,0.08);
    }
    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--brown-dk);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .navbar-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }
    .navbar-links a {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .navbar-links a:hover,
    .navbar-links a.active { color: var(--brown-dk); }

    .navbar-right {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--brown-dk);
    }
    .navbar-right span { color: var(--gold); font-weight: 700; }

    /* ── PAGE WRAPPER ──────────────────────────────────── */
    .page { max-width: 1200px; margin: 0 auto; padding: 50px 60px 80px; }

    /* ── PAGE HEADER ───────────────────────────────────── */
    .page-header {
      margin-bottom: 40px;
    }
    .page-header h1 {
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--brown-dk);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .page-header p {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .page-header-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    /* ── STAT CARDS ────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--brown-card);
      border-radius: var(--radius-card);
      padding: 30px 32px 28px;
      border-top: 5px solid var(--gold);
      position: relative;
      overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      bottom: -20px; right: -20px;
      width: 90px; height: 90px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .stat-card .stat-value {
      font-size: 3rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }
    .stat-card .stat-label {
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.55);
    }

    /* ── DARK CARD ─────────────────────────────────────── */
    .card-dark {
      background: var(--brown-card);
      border-radius: var(--radius-card);
      border-top: 5px solid var(--gold);
      padding: 32px 36px;
      margin-bottom: 24px;
    }
    .card-dark-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--gold);
      margin-bottom: 22px;
    }

    /* ── LIGHT CARD ────────────────────────────────────── */
    .card-light {
      background: rgba(59,26,14,0.05);
      border-radius: var(--radius-card);
      border: 1px solid rgba(59,26,14,0.10);
      padding: 32px 36px;
      margin-bottom: 24px;
    }
    .card-light-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 22px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(59,26,14,0.10);
    }

    /* ── TABLE ─────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      text-align: left;
      padding: 0 16px 14px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      border-bottom: 2px solid rgba(255,255,255,0.10);
    }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.12s; }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    tbody td { padding: 13px 16px; color: rgba(255,255,255,0.88); }

    /* ── BADGES ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge-gold  { background: rgba(212,148,10,0.20); color: var(--gold-lt); }
    .badge-white { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); }

    /* ── BUTTONS ───────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: var(--radius-pill);
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .btn-black {
      background: var(--black);
      color: var(--white);
    }
    .btn-black:hover { background: var(--brown-dk); }

    .btn-gold {
      background: var(--gold);
      color: var(--white);
    }
    .btn-gold:hover { background: var(--gold-lt); }

    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.30);
      color: rgba(255,255,255,0.80);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    .btn-sm { padding: 7px 18px; font-size: 0.72rem; }

    .btn-danger-outline {
      background: transparent;
      border: 1px solid rgba(220,80,60,0.40);
      color: #e07060;
      border-radius: var(--radius-pill);
      font-family: 'Poppins', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 7px 18px;
      transition: all 0.15s;
    }
    .btn-danger-outline:hover { background: rgba(220,80,60,0.12); border-color: #e07060; }

    .actions { display: flex; gap: 8px; align-items: center; }

    /* ── FORMS ─────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px 32px;
    }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.50);
    }

    /* Input con solo borde inferior — estilo Spicy */
    input, select, textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.35);
      padding: 10px 2px;
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35); }
    input:focus, select:focus, textarea:focus { border-bottom-color: var(--gold); }
    select option { background: var(--brown-card); color: var(--white); }
    textarea { resize: vertical; min-height: 80px; }

    .hint {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.30);
      font-style: italic;
    }
    .form-actions {
      margin-top: 36px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* ── QUICK LINKS (index) ───────────────────────────── */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-top: 6px;
    }
    .quick-link {
      display: block;
      padding: 16px 20px;
      border-radius: var(--radius-card);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .quick-link:hover { border-color: var(--gold); color: var(--gold); background: rgba(212,148,10,0.06); }
    .quick-link-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.30);
      margin-bottom: 4px;
    }

    /* ── EMPTY STATE ───────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 56px 24px;
      color: rgba(255,255,255,0.30);
      font-size: 0.9rem;
    }

    /* ── ABOUT BOX ─────────────────────────────────────── */
    .about-box {
      background: rgba(59,26,14,0.06);
      border-left: 4px solid var(--gold);
      border-radius: 0 var(--radius-card) var(--radius-card) 0;
      padding: 20px 24px;
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.75;
    }
    .about-box code {
      background: rgba(59,26,14,0.10);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.82rem;
      color: var(--brown-md);
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="{{ url_for('index') }}" class="navbar-logo">SCOTT DB</a>
  <ul class="navbar-links">
    <li><a href="{{ url_for('index') }}"       class="{{ 'active' if request.endpoint == 'index' }}">Inicio</a></li>
    <li><a href="{{ url_for('departments') }}"  class="{{ 'active' if 'department' in request.endpoint }}">Departamentos</a></li>
    <li><a href="{{ url_for('employees') }}"    class="{{ 'active' if 'employee'   in request.endpoint }}">Empleados</a></li>
    <li><a href="{{ url_for('graph') }}"        class="{{ 'active' if request.endpoint == 'graph' }}">Grafo</a></li>
  </ul>
  <div class="navbar-right"><span>Neo4j</span> Graph CRUD</div>
</nav>

<!-- CONTENT -->
<div class="page">
  {% block content %}{% endblock %}
</div>

</body>
</html>
